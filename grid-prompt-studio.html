<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Prompt Studio — Swiss Grid</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<style>
/* ============================================================
   APP CHROME — Swiss design-system shell (Grayn-style monochrome)
   Three panes: LEFT layout picker · CENTER preview · RIGHT config.
   Tokens: warm off-white ground, near-black ink, subtle gray borders,
   white cards, tiny uppercase JetBrains-Mono labels, 6px radius.
   The PREVIEW keeps the GENUINE load-bearing grid engineering:
   one CSS-var source of truth, overlay in the SAME content box,
   subgrid bands, 8px baseline lock, runtime optical alignment.
   ============================================================ */
:root{
  --bg:hsl(40 20% 98%); --fg:hsl(0 0% 9%); --card:#ffffff;
  --muted:hsl(40 10% 94%); --muted-fg:hsl(0 0% 45%);
  --border:hsl(0 0% 90%); --input:hsl(0 0% 90%);
  --secondary:hsl(40 10% 94%); --rad:6px;
  --preview-ink:#002FA7;  /* echo of the preview ink (Klein blue), used in the layout picker */
  --accent:#002FA7;       /* UI theme color (Klein blue) — primary/active/focus states */
}
/* smooth recolor when the accent / theme changes */
.btn,.chip,select,input,textarea,.skel .frame,.skel .r,.skel .nm,#layouts .brand .mark{
  transition:background-color .35s ease,border-color .35s ease,color .35s ease,box-shadow .35s ease;}
#paper,#paper .kicker,#paper .masthead,#paper .headline,#paper .numeral,#paper .meta,
#paper .cap,#paper .folio,#paper .pill,#paper .guides .col,#paper .deco svg path,#paper .deco .spark svg path{
  transition:color .35s ease,background-color .35s ease,box-shadow .35s ease,
    fill .35s ease,text-shadow .35s ease,border-color .35s ease;}
*{box-sizing:border-box;}
html,body{height:100%;}
/* ---- custom scrollbars (light theme) ---- */
*{scrollbar-width:thin;scrollbar-color:#d9d7d1 transparent;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#dcdad4;border-radius:8px;border:2px solid transparent;
  background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:var(--accent);border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-corner{background:transparent;}
body{margin:0;font-family:"Inter","Noto Sans SC",system-ui,sans-serif;background:var(--bg);color:var(--fg);
  display:grid;grid-template-columns:252px 1fr 348px;grid-template-rows:100vh;height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;}

/* tiny mono section label used across all three panes */
.section-label{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;
  text-transform:uppercase;letter-spacing:.1em;color:var(--muted-fg);}

/* ---- LEFT PANE — layout picker ---- */
#layouts{background:var(--card);border-right:1px solid var(--border);overflow:hidden;
  display:flex;flex-direction:column;min-height:0;}
#layouts .lhead{padding:16px 14px 10px;border-bottom:1px solid var(--border);}
#layouts .brand{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
#layouts .brand .mark{width:22px;height:22px;border-radius:5px;background:var(--fg);color:var(--bg);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
#layouts .brand b{font-size:13px;font-weight:700;letter-spacing:.01em;}
#layouts .brand span{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted-fg);
  margin-left:auto;letter-spacing:.06em;}
#layoutSearch{width:100%;background:var(--bg);border:1px solid var(--input);color:var(--fg);
  font-family:"Inter",sans-serif;font-size:12px;padding:7px 9px;border-radius:var(--rad);margin-top:8px;}
#layoutSearch:focus{outline:none;border-color:var(--accent);}
.archfilter{display:flex;flex-wrap:wrap;gap:4px;margin-top:9px;}
.chip{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 7px;border-radius:999px;border:1px solid var(--border);background:var(--card);
  color:var(--muted-fg);cursor:pointer;}
.chip:hover{border-color:var(--accent);}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
#skelsWrap{flex:1;overflow-y:auto;padding:12px 14px 40px;}
#layoutCount{font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--muted-fg);
  margin:0 0 10px;letter-spacing:.04em;}

/* ---- RIGHT PANE — config ---- */
#panel{background:var(--card);border-left:1px solid var(--border);overflow-y:auto;padding:16px 16px 60px;}
#panel h1{font-size:14px;letter-spacing:.01em;margin:0 0 2px;font-weight:700;color:var(--fg);}
#panel .sub{font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted-fg);margin:0 0 16px;}
.group{margin-bottom:14px;}
.group > label.cap{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:8px;}
/* config cards (Grayn agentic-card) */
.card{border:1px solid var(--border);border-radius:var(--rad);background:var(--card);
  padding:12px;margin-bottom:12px;}
.card > .cap{display:block;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;color:var(--muted-fg);margin-bottom:10px;}
select,input[type=text],textarea{width:100%;background:var(--bg);border:1px solid var(--input);color:var(--fg);
  font-family:"Inter",sans-serif;font-size:13px;padding:8px 9px;border-radius:var(--rad);}
select:focus,input:focus,textarea:focus{outline:none;border-color:var(--accent);}
textarea{resize:vertical;min-height:52px;line-height:1.4;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted-fg);margin-bottom:4px;font-family:"JetBrains Mono",monospace;}
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.slider label{display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;
  font-size:10px;color:var(--muted-fg);margin-bottom:4px;}
.slider label b{color:var(--fg);font-weight:600;}
input[type=range]{width:100%;accent-color:var(--accent);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.hint{font-size:11px;color:var(--muted-fg);line-height:1.5;margin:6px 0 0;}
.accentrow{display:flex;gap:8px;align-items:center;}
.accentrow input[type=color]{width:38px;height:34px;padding:0;border:1px solid var(--input);background:var(--bg);border-radius:var(--rad);}

/* ---- skeleton wireframe cards (the "骨架图") ---- */
.skels{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.skel{position:relative;cursor:pointer;border:none;border-radius:6px;
  background:transparent;padding:0 0 16px;transition:transform .15s;}
.skel:hover .frame{box-shadow:0 0 0 2px var(--border);}
.skel.sel .frame{box-shadow:0 0 0 2px var(--preview-ink);}
.skel .frame{position:relative;width:100%;aspect-ratio:5/3.4;background:var(--card);border-radius:4px;overflow:hidden;
  box-shadow:0 0 0 1px var(--border);transition:box-shadow .15s;}
.skel .r{position:absolute;}
.skel .r.bar{background:var(--preview-ink);}   /* title / headline */
.skel .r.blk{background:var(--preview-ink);}   /* numeral block */
.skel .r.line{background:hsl(0 0% 45%);opacity:.4;}  /* body / lead lines */
.skel .r.box{background:hsl(0 0% 45% / .14);}  /* figure */
.skel .r.tick{background:hsl(0 0% 45% / .55);} /* meta / caption */
.skel .nm{position:absolute;left:6px;right:6px;bottom:2px;font-family:"JetBrains Mono",monospace;
  font-size:8px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted-fg);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.skel.sel .nm{color:var(--preview-ink);font-weight:600;}

/* ---- CENTER — preview ---- */
#right{display:flex;flex-direction:column;min-width:0;min-height:0;background:var(--muted);}
#toolbar{height:52px;flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:0 16px;
  border-bottom:1px solid var(--border);background:var(--card);}
#toolbar .spacer{flex:1;}
.btn{background:var(--card);color:var(--fg);border:1px solid var(--border);cursor:pointer;
  font-family:"JetBrains Mono",monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;
  padding:8px 12px;border-radius:var(--rad);display:inline-flex;align-items:center;gap:8px;
  white-space:nowrap;flex-shrink:0;}
.btn:hover{border-color:var(--accent);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.btn .dot{width:7px;height:7px;border-radius:50%;background:#cfccc5;}
.btn.on{background:var(--accent);border-color:var(--accent);color:#fff;} .btn.on .dot{background:#fff;}
/* layer toggles inside the right panel card */
.toggles{display:flex;flex-wrap:wrap;gap:6px;}
.toggles .btn{flex:1 1 auto;justify-content:center;}
#dims{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--muted-fg);}

#stagewrap{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:34px;}
#stageScale{transform-origin:top center;}


/* ============================================================
   THE PREVIEW PAPER — genuine grid scaffold (one source of truth)
   content AND overlay read the same vars on #paper.
   ============================================================ */
#paper{
  --cols:12; --rows:0;
  --bl:8px; --lh:24px; --gutter:24px; --margin:72px; --maxw:1296px;
  --paper:#FCFBF9;                          /* warm off-white ground */
  --ink:#002FA7;             /* primary display ink (Klein blue) */
  --ghost:#D4D4D4;         /* light gray — offset double-print */
  --ink-soft:hsl(0 0% 45%);/* gray — labels / secondary */
  --text:hsl(0 0% 13%);                      /* near-black body text on off-white */
  --accent:#002FA7;
  --ghost-dx:6px; --ghost-dy:8px;
  --g-col:color-mix(in oklch, var(--accent) 10%, transparent);
  --g-edge:color-mix(in oklch, var(--accent) 55%, transparent);
  --g-base:color-mix(in oklch, var(--ghost) 34%, transparent);
  --g-base-min:color-mix(in oklch, var(--ghost) 12%, transparent);
  --g-row:color-mix(in oklch, var(--ghost) 50%, transparent);
  position:relative;background:var(--paper);color:var(--ink);
  width:var(--maxw);box-shadow:0 24px 70px rgba(0,0,0,.35);
  font-family:"Inter","Noto Sans SC",system-ui,sans-serif;
  font-size:16px;line-height:var(--lh);}
#paper img{display:block;width:100%;height:100%;object-fit:cover;}
#paper.fixed{overflow:hidden;}

.wrap{position:relative;width:100%;padding:var(--pad,96px) var(--margin);min-height:inherit;z-index:2;}
.grid{display:grid;grid-template-columns:repeat(var(--cols),1fr);
  grid-auto-rows:minmax(0,auto);column-gap:var(--gutter);row-gap:var(--lh);}
/* layout-switch entrance: each placed item fades+rises in with a small stagger.
   The delay is set inline per item in render() via --i. */
@keyframes itemIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.grid > *{animation:itemIn .42s cubic-bezier(.22,.61,.36,1) both;
  animation-delay:calc(var(--i,0) * 28ms);}
@media (prefers-reduced-motion:reduce){ .grid > *{animation:none;} }

/* content type — sizes are FLUID (set per-canvas in applyVars via --fs-* / --lh-*),
   line-heights are px multiples of --bl so the baseline lock still holds. */
.kicker{font-family:"Space Mono",monospace;font-size:13px;line-height:var(--bl);
  letter-spacing:.22em;text-transform:uppercase;color:var(--ink);
  padding:8px 0;border-top:2px solid var(--ink);align-self:start;}
.masthead{font-weight:900;font-size:var(--fs-masthead,104px);line-height:var(--lh-masthead,96px);
  letter-spacing:-.02em;margin:0;color:var(--ink);position:relative;}
.headline{font-weight:800;font-size:var(--fs-headline,34px);line-height:var(--lh-headline,40px);
  letter-spacing:-.01em;margin:0;color:var(--ink);position:relative;}
.lead{font-size:var(--fs-lead,17px);line-height:var(--lh);font-weight:400;margin:0;color:var(--text);}
.body{font-size:14px;line-height:var(--lh);color:var(--ink-soft);margin:0;}
.numeral{font-weight:900;font-size:var(--fs-numeral,140px);line-height:var(--lh-numeral,128px);
  letter-spacing:-.04em;margin:0;color:var(--ink);position:relative;}
.meta{border-top:2px solid var(--ink);padding-top:8px;align-self:start;}
.meta .mk{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;
  text-transform:uppercase;color:var(--ink-soft);line-height:var(--bl);margin-bottom:8px;}
.meta .mv{font-size:15px;line-height:var(--lh);font-weight:600;color:var(--text);}
figure{margin:0;position:relative;background:color-mix(in oklch, var(--ghost) 12%, transparent);border:1px solid var(--ghost);}
.cap{font-family:"Space Mono",monospace;font-size:10px;line-height:var(--bl);
  letter-spacing:.06em;color:var(--ink-soft);padding-top:8px;align-self:start;}
.folio{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.16em;
  color:var(--ink-soft);text-transform:uppercase;border-top:2px solid var(--ink);padding-top:8px;}

/* ghost double-print (offset slate under the pink) — poster signature.
   Implemented as a hard-edged text-shadow so the ghost tracks EVERY glyph
   exactly, regardless of wrapping, centering, optical nudge or arch rotation
   (the old ::before copy could re-wrap differently and drift). */
#paper.ghost-on .masthead,
#paper.ghost-on .headline,
#paper.ghost-on .numeral{
  text-shadow:var(--ghost-dx) var(--ghost-dy) 0 var(--ghost);}

/* poster-only flourishes */
.arch{transform:rotate(-3deg);transform-origin:left center;text-align:center;}
.center{text-align:center;}
.pill{border:2px solid var(--ink);border-radius:999px;padding:14px 28px;text-align:center;
  font-family:"Space Mono",monospace;font-size:13px;line-height:var(--lh);letter-spacing:.04em;
  color:var(--ink-soft);}

/* ---- DECORATION layer (sparkles + squiggles) ---- */
.deco{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:0;transition:opacity .3s ease;}
#paper.deco-on .deco{opacity:1;}
.deco .spark{position:absolute;}
.deco svg{position:absolute;overflow:visible;}

/* ---- OVERLAY (same content box → columns match exactly) ---- */
.guides{position:absolute;inset:0;pointer-events:none;z-index:60;opacity:0;transition:opacity .26s ease;}
#paper.grid-on .guides{opacity:1;}
.guides .cols{position:absolute;top:0;bottom:0;left:var(--margin);right:var(--margin);
  display:grid;grid-template-columns:repeat(var(--cols),1fr);column-gap:var(--gutter);}
.guides .col{background:var(--g-col);box-shadow:inset 1px 0 0 var(--g-edge),inset -1px 0 0 var(--g-edge);position:relative;}
.guides .col span{position:absolute;top:34px;left:0;right:0;text-align:center;
  font-family:"Space Mono",monospace;font-size:10px;line-height:1;color:var(--ink);}
.guides .rows{position:absolute;left:var(--margin);right:var(--margin);top:var(--pad,96px);bottom:0;
  background-image:
    repeating-linear-gradient(to bottom,var(--g-base) 0 1px,transparent 1px var(--lh)),
    repeating-linear-gradient(to bottom,var(--g-base-min) 0 1px,transparent 1px var(--bl));}
.guides .frows{position:absolute;left:var(--margin);right:var(--margin);top:var(--pad,96px);bottom:var(--pad,96px);
  display:none;grid-template-rows:repeat(var(--rows),1fr);row-gap:var(--gutter);}
#paper.has-rows .guides .frows{display:grid;}
.guides .frow{box-shadow:inset 0 1px 0 var(--g-row),inset 0 -1px 0 var(--g-row);}
.guides .mline{position:absolute;top:0;bottom:0;width:1px;background:var(--g-edge);}
.guides .mline.l{left:var(--margin);} .guides .mline.r{right:var(--margin);}
</style></head>

<body>
<!-- ================= LEFT PANE — LAYOUT PICKER ================= -->
<aside id="layouts">
  <div class="lhead">
    <div class="brand">
      <span class="mark">G</span>
      <b>Grid Studio</b>
      <span>256</span>
    </div>
    <div class="section-label" data-i18n="capLayout">布局 — 构图</div>
    <input type="text" id="layoutSearch" data-i18n-ph="phSearch" placeholder="搜索布局…">
    <div class="archfilter" id="archFilter"></div>
  </div>
  <div id="skelsWrap">
    <p id="layoutCount"></p>
    <div class="skels" id="skels"></div>
    <p class="hint" id="layoutHint"></p>
  </div>
</aside>

<!-- ================= CENTER — PREVIEW ================= -->
<section id="right">
  <div id="toolbar">
    <span id="dims"></span>
    <span class="spacer"></span>
    <button class="btn" id="langToggle">EN</button>
    <button class="btn" id="copyPrompt" data-i18n="btnCopy">复制提示词</button>
    <button class="btn primary" id="exportPng" data-i18n="btnExport">导出 PNG</button>
  </div>
  <div id="stagewrap">
    <div id="stageScale">
      <div id="paper" class="deco-on ghost-on grid-on">
        <div class="deco" aria-hidden="true" id="deco"></div>
        <div class="wrap">
          <div class="grid" id="grid"></div>
        </div>
        <div class="guides" aria-hidden="true">
          <div class="cols"></div>
          <div class="frows"></div>
          <div class="rows"></div>
          <div class="mline l"></div><div class="mline r"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ================= RIGHT PANE — PROPERTIES ================= -->
<aside id="panel">
  <h1>Grid Prompt Studio</h1>
  <p class="sub" data-i18n="sub">瑞士网格 · 模块系统</p>

  <div class="card">
    <label class="cap" data-i18n="capLayers">显示图层</label>
    <div class="toggles">
      <button class="btn on" id="gridToggle"><span class="dot"></span><span class="lbl" data-i18n="tgGridHide">隐藏网格</span></button>
      <button class="btn on" id="decoToggle"><span class="dot"></span><span class="lbl" data-i18n="tgDecor">装饰</span></button>
      <button class="btn on" id="ghostToggle"><span class="dot"></span><span class="lbl" data-i18n="tgGhost">重影</span></button>
    </div>
  </div>

  <div class="card">
    <label class="cap" data-i18n="capField">网格 / 模块(密度)</label>
    <select id="field"></select>
    <p class="hint" id="fieldHint"></p>
  </div>

  <div class="card">
    <label class="cap" data-i18n="capCanvas">画布 — 尺寸</label>
    <select id="canvas"></select>
    <p class="hint" id="canvasHint"></p>
  </div>

  <div class="card">
    <label class="cap" data-i18n="capParams">网格参数</label>
    <div class="sliders">
      <div class="slider"><label><span data-i18n="slBaseline">基线</span> <b id="blV">8</b>px</label><input type="range" id="bl" min="4" max="16" step="2" value="8"></div>
      <div class="slider"><label><span data-i18n="slGutter">列间距</span> <b id="guV">24</b>px</label><input type="range" id="gu" min="8" max="48" step="4" value="24"></div>
      <div class="slider"><label><span data-i18n="slMargin">页边距</span> <b id="maV">72</b>px</label><input type="range" id="ma" min="24" max="160" step="8" value="72"></div>
      <div class="slider"><label><span data-i18n="slImg">图片行数</span> <b id="imV">12</b></label><input type="range" id="im" min="4" max="20" step="1" value="12"></div>
    </div>
    <div class="field" style="margin-top:12px;">
      <label data-i18n="lblAccent">强调色</label>
      <div class="accentrow">
        <input type="color" id="accent" value="#002FA7">
        <input type="text" id="accentHex" value="#002FA7">
      </div>
      <p class="hint" data-i18n="hintAccent">默认克莱因蓝。配色:暖米白底、克莱因蓝墨、浅灰重影。可改任意色。</p>
    </div>
  </div>

  <div class="card">
    <label class="cap" data-i18n="capEls">页面元素</label>
    <div class="field"><label data-i18n="lbl_kicker">标签 / 日期</label><input type="text" id="f_kicker" value="2026 / 06 / 07"></div>
    <div class="field"><label data-i18n="lbl_title">标题 / 主标题</label><input type="text" id="f_title" value="猫咪天堂"></div>
    <div class="field"><label data-i18n="lbl_headline">副标题</label><textarea id="f_headline">按需定制,新鲜直达。</textarea></div>
    <div class="field"><label data-i18n="lbl_lead">引言</label><textarea id="f_lead">在猫咪天堂,每一件都用心制作、为你定制,把温暖与喜悦带进你的日常。</textarea></div>
    <div class="row2">
      <div class="field"><label data-i18n="lbl_metaAk">元信息 A — 名称</label><input type="text" id="f_metaAk" value="工作室"></div>
      <div class="field"><label data-i18n="lbl_metaAv">元信息 A — 内容</label><input type="text" id="f_metaAv" value="天堂制作"></div>
    </div>
    <div class="row2">
      <div class="field"><label data-i18n="lbl_metaBk">元信息 B — 名称</label><input type="text" id="f_metaBk" value="版本"></div>
      <div class="field"><label data-i18n="lbl_metaBv">元信息 B — 内容</label><input type="text" id="f_metaBv" value="第 04 期 · 2026"></div>

    if(n&&f){ var t=['a','b','y1','y2']; t.forEach(function(p){ var tmp=n[p]; n[p]=f[p]; f[p]=tmp; }); }

    if(h){ if(h.opt&&h.opt.center){ h.a=0.02; h.b=0.98; } else { h.a=0; h.b=1; } }
  } else if(emp===3){ // HERO — widen the hero (title, else numeral)

/* ---------------- render the preview ---------------- */
function gcol(a,b,cols){ var x=L(a,cols),y=L(b,cols); if(y<=x)y=Math.min(cols+1,x+1); return x+' / '+y; }

function render(){
  readFields();

  var grid=document.getElementById('grid');
  grid.style.gridTemplateRows='repeat('+tpl.rows+', auto)';
  grid.innerHTML='';
  var _i=0;
  tpl.place(cols).forEach(function(it){
    var node=makeNode(it);
    if(!node) return;
    node.style.gridColumn=gcol(it.a,it.b,cols);
    node.style.gridRow=it.r1+' / '+it.r2;
    node.style.setProperty('--i', _i++);
    grid.appendChild(node);
  });

/* Shrink any single-line display element whose ink overflows its own column
   box, so headlines fill their column without wrapping mid-word or spilling.
   Multi-line elements (lead/body) are left to wrap naturally. */
function fitDisplay(){
  document.querySelectorAll('#paper .masthead, #paper .numeral, #paper .headline').forEach(function(e){
    e.style.whiteSpace='nowrap';                 // measure as one line
    var box=e.parentElement;                     // the grid cell
    var avail=box.clientWidth;
    if(!avail){ e.style.whiteSpace=''; return; }
    var cur=parseFloat(getComputedStyle(e).fontSize);
    var natural=e.scrollWidth;
    if(natural>avail){
      var fs=Math.max(12, Math.floor(cur*avail/natural));
      e.style.fontSize=fs+'px';
      e.style.lineHeight=snap(fs*0.96, state.bl)+'px';
    }
    e.style.whiteSpace='';                        // allow wrap only if still too wide
  });
}

function el(tag,cls,txt){ var n=document.createElement(tag); if(cls)n.className=cls; if(txt!=null)n.textContent=txt; return n; }

function makeNode(it){
  var k=it.key, o=it.opt||{}, node;
  if(k==='kicker'){ if(!els.kicker)return null; node=el('div','kicker',els.kicker); }
  else if(k==='title'){ if(!els.title)return null; node=el('h1','masthead',els.title); ghostable(node,els.title); if(o.arch)node.classList.add('arch'); }
  else if(k==='headline'){ if(!els.headline)return null; node=el('h2','headline',els.headline); ghostable(node,els.headline); }
  else if(k==='lead'){ if(!els.lead)return null; node=el('p','lead',els.lead); }
  else if(k==='numeral'){
    if(!els.numeral)return null;
    node=document.createElement('div');
    var n=el('div','numeral',els.numeral); ghostable(n,els.numeral); node.appendChild(n);
    if(els.numcap){ var cap=el('div','body',els.numcap); cap.style.cssText='font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);'; node.appendChild(cap); }
  }
  else if(k==='figure'){
    node=document.createElement('figure');
    node.style.height='calc(var(--lh) * '+state.im+')';
    if(els.img){ var im=document.createElement('img'); im.src=els.img; im.crossOrigin='anonymous'; im.onerror=function(){this.style.display='none';}; node.appendChild(im); }
  }
  else if(k==='metaA'){ if(!els.metaAk&&!els.metaAv)return null; node=el('div','meta'); node.appendChild(el('div','mk',els.metaAk)); node.appendChild(el('div','mv',els.metaAv)); }
  else if(k==='metaB'){ if(!els.metaBk&&!els.metaBv)return null; node=el('div','meta'); node.appendChild(el('div','mk',els.metaBk)); node.appendChild(el('div','mv',els.metaBv)); }
  else if(k==='caption'){ if(!els.caption)return null; node=el('div','cap',els.caption); }
  else if(k==='pill'){ if(!els.lead&&!els.caption)return null; node=el('div','pill',els.lead||els.caption); }
  else if(k==='folio'){
    node=el('div','folio', nm(genLayout(state.layout))+'  ·  '+nm(FIELDS[state.field])+'  ·  '+nm(CANVASES[state.canvas])+'  ·  '+t('slBaseline')+' '+state.bl+'px');
  }

  return node;
}

function hexA(hex,a){ hex=hex.replace('#',''); if(hex.length===3)hex=hex.split('').map(function(x){return x+x;}).join('');
  var r=parseInt(hex.slice(0,2),16),g=parseInt(hex.slice(2,4),16),b=parseInt(hex.slice(4,6),16);
  return 'rgba('+r+','+g+','+b+','+a+')'; }

/* ---------------- FLUID DISPLAY TYPE ----------------
   Display sizes scale with the canvas's content width so big type doesn't
   wrap awkwardly on narrow canvases (poster/A4) — line-heights snap to whole
   baseline multiples so the baseline lock still holds. The fit() helper then
   shrinks any element that STILL overflows its own column box after layout. */
function snap(px,bl){ return Math.max(bl, Math.round(px/bl)*bl); }
function applyFluidType(C, lh){
  var p=document.getElementById('paper'), bl=state.bl;
  var contentW = C.w - 2*C.margin;                        // type-area width
  var REF = 1296 - 2*72;                                  // spread reference (=1152)
  var k = Math.max(0.66, Math.min(1.2, contentW/REF));    // scale factor, clamped (gentler floor)
  function set(varFs, varLh, baseFs, lhRatio, min){
    var fs = Math.max(min, Math.round(baseFs*k));
    p.style.setProperty(varFs, fs+'px');
    p.style.setProperty(varLh, snap(fs*lhRatio, bl)+'px'); // baseline-locked leading
  }
  set('--fs-masthead','--lh-masthead', 110, 0.92, 36);
  set('--fs-numeral', '--lh-numeral',  150, 0.92, 48);
  set('--fs-headline','--lh-headline',  34, 1.18, 18);
  var leadFs = Math.max(14, Math.min(19, Math.round(16*k)+1));
  p.style.setProperty('--fs-lead', leadFs+'px');
}

function fitStage(){
  var p=document.getElementById('paper'), wrap=document.getElementById('stagewrap'), scaleEl=document.getElementById('stageScale');
  var C=CANVASES[state.canvas];
  var availW=wrap.clientWidth-68, availH=wrap.clientHeight-68;
  var w=p.offsetWidth||C.w;
  var s;
  if(C.h){ // fixed page (A4 / poster / square) — fit BOTH so the whole page is visible
    var h=p.offsetHeight||C.h;
    s=Math.min(1, availW/w, availH/h);
  } else { // fluid-height canvas — fit WIDTH only and scroll vertically, so the
    // scale depends only on the (constant) canvas width and switching layouts
    // no longer rescales the whole preview.
    s=Math.min(1, availW/w);
  }
  scaleEl.style.transform='scale('+s+')';
}
window.addEventListener('resize', function(){ fitStage(); opticalAlign(); });

/* ---------------- overlay guides ---------------- */
function buildGuides(){

    var s=document.createElement('span'); s.textContent=i; c.appendChild(s); colsHost.appendChild(c); }

/* ---------------- decoration (sparkles + squiggles) ---------------- */
function sparkSVG(size,color){
  return '<svg class="spark" width="'+size+'" height="'+size+'" viewBox="0 0 100 100">'+
    '<path d="M50 0 C54 38 62 46 100 50 C62 54 54 62 50 100 C46 62 38 54 0 50 C38 46 46 38 50 0 Z" fill="'+color+'"/></svg>';
}
function buildDeco(){
  var d=document.getElementById('deco'); d.innerHTML='';
  // sparkles (deterministic positions; a gray ghost copy is offset behind each ink star)
  var sp=[[88,6,46],[6,84,52],[90,80,30],[10,22,26]];
  sp.forEach(function(s){
    var ghost='<div class="spark" style="position:absolute;left:'+(s[0])+'%;top:'+(s[1])+'%;transform:translate(6px,8px);">'+sparkSVG(s[2],'var(--ghost)')+'</div>';
    var ink  ='<div class="spark" style="position:absolute;left:'+(s[0])+'%;top:'+(s[1])+'%;">'+sparkSVG(s[2],'var(--ink)')+'</div>';
    d.insertAdjacentHTML('beforeend', ghost+ink);
  });

  d.insertAdjacentHTML('beforeend',
    '<svg style="left:0;top:62%;width:100%;height:120px" viewBox="0 0 1000 120" preserveAspectRatio="none">'+
    '<path d="M0 60 C 120 0, 200 120, 340 60 S 560 0, 700 60 S 900 120, 1000 60" fill="none" stroke="var(--ink)" stroke-width="2"/>'+

    '<svg style="left:0;top:10%;width:100%;height:90px" viewBox="0 0 1000 90" preserveAspectRatio="none">'+
    '<path d="M0 45 C 160 90, 240 0, 420 45 S 720 90, 1000 30" fill="none" stroke="var(--ghost)" stroke-width="2"/></svg>');
}

/* ---------------- OPTICAL ALIGNMENT (skill §2.6) ---------------- */
var _cvs=document.createElement('canvas'), _ctx=_cvs.getContext('2d');
function opticalAlign(){
  document.querySelectorAll('#paper [data-optical]').forEach(function(e){
    e.style.marginLeft='0px';
    // optical alignment only makes sense for flush-LEFT type; skip centered
    // elements (poster/statement) or their margin-left would push them off-center.
    if(e.closest('.center')) return;
    var cs=getComputedStyle(e), ch=(e.textContent||'').trim().charAt(0); if(!ch)return;
    if(cs.textTransform==='uppercase')ch=ch.toUpperCase();
    _ctx.font=cs.fontStyle+' '+cs.fontWeight+' '+cs.fontSize+' '+cs.fontFamily; _ctx.textAlign='left';
    var abl=_ctx.measureText(ch).actualBoundingBoxLeft;
    if(isFinite(abl)) e.style.marginLeft=abl.toFixed(2)+'px';
  });
}

}

/* ---------------- skeleton wireframe picker ---------------- */
function roleClass(key){
  if(key==='title'||key==='headline')return 'bar';
  if(key==='numeral')return 'blk';
  if(key==='figure')return 'box';
  if(key==='lead')return 'line';
  if(key==='pill')return 'box';
  return 'tick';
}
/* draw a layout's wireframe skeleton into `frame` (reused by the left list) */
function drawSkeleton(frame, tpl){
  var R=tpl.rows;
  tpl.place(12).forEach(function(it){
    if(it.key==='folio')return;
    var r=document.createElement('div'); r.className='r '+roleClass(it.key);
    var x=it.a*100, w=(it.b-it.a)*100, y=(it.r1-1)/R*100, h=(it.r2-it.r1)/R*100;
    r.style.left=(x*0.92+4)+'%'; r.style.width=Math.max(2,w*0.92)+'%';
    r.style.top=(y*0.86+7)+'%'; r.style.height=Math.max(3,h*0.86-3)+'%';
    if(roleClass(it.key)==='line'){ r.style.height='3px'; }
    frame.appendChild(r);
  });
}

  o.push('- 单一真理源:所有网格参数写在 :root CSS 变量里;正文与网格叠加层读取同一组变量。');
  o.push('');
  o.push('元素(列跨度 + 行位置)');
  tpl.place(cols).forEach(function(it){
    var content=elContent(it);
    if(it.key==='figure' && !els.img) content='(图片,高度 = '+state.im+'× 行高 = '+(state.im*lh)+'px)';
    var extra=''; if(it.opt&&it.opt.arch)extra=' [拱形+旋转]'; if(it.opt&&it.opt.center)extra+=' [居中]';
    o.push('- '+(labelMap[it.key]||it.key)+':「'+content+'」→ '+sp(it.a,it.b)+',行 '+it.r1+'/'+it.r2+extra);
  });
  o.push('');
  o.push('配色(瑞士)');
  o.push('- 暖米白底 #FCFBF9,克莱因蓝展示墨 '+state.accent+',浅灰重影 #D4D4D4,近黑正文 hsl(0 0% 13%)。墨色是单一强调变量——可换成任意色相整体改色。');
  o.push('');
  o.push('字体与装饰');
  o.push('- 展示字与正文用无衬线 grotesque(Inter / Helvetica Now / Archivo);标签/页脚/图注/网格标注用等宽(JetBrains Mono / Space Mono);中文用 Noto Sans SC。除居中海报条带外一律左对齐(右侧不齐)。层级靠字号+字重,而非颜色。');
  o.push('- 展示字带「重影双印」:在墨色字后方偏移 +6/+8px 放一份浅灰副本(::before content:attr(data-text),与本体同盒、同换行、同对齐)。');
  o.push('- 装饰:四角星芒 + 波浪曲线,置于页边/留白处(墨色 + 浅灰重影),位于内容之后。');
  if(genLayout(state.layout).id==='poster')o.push('- 海报专属:拱形且略微旋转的主标题、居中巨型数字主视觉、底部胶囊描边说明。');
  o.push('');
  o.push('承重工程(必须保证)');
  o.push('- 叠加层与内容处于同一内容盒(left/right=var(--margin),相同的 repeat(var(--cols),1fr)+列间距),使叠加层的列在任意宽度下都「就是」内容的列。');
  o.push('- 按列线与行线放置(显式 grid-column + grid-row)—— 不靠肉眼估算跨度。');
  o.push('- 基线锁定:所有 line-height/margin/padding/媒体高度都是 '+state.bl+'px 的整数倍;展示字行高用 px(绝不用无单位)。');
  o.push('- 光学对齐:在 fonts.ready 之后与 resize 时,按每个展示元素首字形的左侧承距(canvas actualBoundingBoxLeft)微调,使「墨迹」而非盒子落在列线上。');
  o.push('- 网格叠加开关(按钮 + 「G」键):带编号的列字段、基线(每 '+lh+'px 主线、每 '+state.bl+'px 次线)、页边线'+(F.rows?'、以及 '+F.rows+' 条模块行字段':'')+'。');
  o.push('');
  o.push('校验 —— 用无头浏览器在 1440/1180/900 渲染:列吻合 ~0px(两侧边)、叠加层吻合 ~0px、基线 ≤ 半个基线、光学墨迹 = 各元素自身的列线。目标:col=0px overlay=0px baseline≤4px ink=0px → GRID VERIFY: PASS。');
  return o.join('\n');
}

document.getElementById('copyPrompt').addEventListener('click', function(){
  readFields(); var txt=buildPrompt(), self=this;
  var buf=document.getElementById('promptBuf'); buf.value=txt;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){flash(self);}).catch(function(){ buf.select(); document.execCommand('copy'); flash(self); });
  } else { buf.select(); document.execCommand('copy'); flash(self); }
});
function flash(b){ var t0=b.textContent; b.textContent=t('btnCopied'); setTimeout(function(){ b.textContent=t0; },1300); }

/* ---------------- EXPORT PNG ---------------- */
document.getElementById('exportPng').addEventListener('click', function(){
  var self=this, paper=document.getElementById('paper'), t0=self.textContent; self.textContent=t('btnRender');
  var wasGrid=paper.classList.contains('grid-on'); paper.classList.remove('grid-on'); // hide overlay in export
  htmlToImage.toPng(paper,{pixelRatio:2,backgroundColor:'#FCFBF9',cacheBust:true,width:paper.offsetWidth,height:paper.offsetHeight})
    .then(function(url){ var a=document.createElement('a'); a.download='swiss-grid-'+state.layout+'-'+state.field+'.png'; a.href=url; a.click();
      if(wasGrid)paper.classList.add('grid-on'); self.textContent=t0; })
    .catch(function(err){ console.error(err); if(wasGrid)paper.classList.add('grid-on'); self.textContent=t('btnFail'); setTimeout(function(){self.textContent=t0;},1500); });
});

/* ---------------- wire up ---------------- */
function fillSelect(id,map){ var s=document.getElementById(id); var cur=s.value; s.innerHTML='';
  Object.keys(map).forEach(function(k){ var o=document.createElement('option'); o.value=k; o.textContent=nm(map[k]); s.appendChild(o); });
  if(cur)s.value=cur; }
fillSelect('field',FIELDS); fillSelect('canvas',CANVASES);

function syncHints(){
  document.getElementById('layoutHint').textContent=ds(genLayout(state.layout));
  document.getElementById('fieldHint').textContent=hn(FIELDS[state.field]);
  document.getElementById('canvasHint').textContent=hn(CANVASES[state.canvas]);
}
document.getElementById('field').addEventListener('change',function(){ state.field=this.value; syncHints(); render(); });
document.getElementById('canvas').addEventListener('change',function(){ state.canvas=this.value; syncHints(); render(); });

function bindSlider(id,key,labelId){ var s=document.getElementById(id);
  s.addEventListener('input',function(){ state[key]=parseInt(this.value,10); document.getElementById(labelId).textContent=this.value; render(); }); }
bindSlider('bl','bl','blV'); bindSlider('gu','gu','guV'); bindSlider('ma','ma','maV'); bindSlider('im','im','imV');

var accent=document.getElementById('accent'), accentHex=document.getElementById('accentHex');
accent.addEventListener('input',function(){ state.accent=this.value; accentHex.value=this.value; render(); });
accentHex.addEventListener('change',function(){ if(/^#?[0-9a-fA-F]{6}$/.test(this.value)){ var hx=this.value[0]==='#'?this.value:'#'+this.value; state.accent=hx; accent.value=hx; render(); } });

['f_kicker','f_title','f_headline','f_lead','f_metaAk','f_metaAv','f_metaBk','f_metaBv','f_numeral','f_numcap','f_img','f_caption']
  .forEach(function(id){ document.getElementById(id).addEventListener('input',function(){ this.dataset.touched='1'; render(); }); });

/* ---------------- language switch ---------------- */
var FIELD_IDS=['f_kicker','f_title','f_headline','f_lead','f_metaAk','f_metaAv','f_metaBk','f_metaBv','f_numeral','f_numcap','f_img','f_caption'];
function sampleMatchesOther(){
  // true if current field values still equal the *other* language's sample (i.e. user hasn't customized)
  var other=state.lang==='zh'?SAMPLE.en:SAMPLE.zh;
  return FIELD_IDS.every(function(id){
    var key=id.slice(2);
    return document.getElementById(id).value.trim()===String(other[key]||'').trim();
  });
}
function loadSample(lang){
  var s=SAMPLE[lang];
  FIELD_IDS.forEach(function(id){ var key=id.slice(2); var elx=document.getElementById(id);
    if(s[key]!==undefined){ elx.value=s[key]; delete elx.dataset.touched; } });
}
function applyLang(){
  document.documentElement.lang = state.lang==='zh'?'zh-CN':'en';
  // static text nodes
  document.querySelectorAll('[data-i18n]').forEach(function(elx){ elx.textContent=t(elx.getAttribute('data-i18n')); });
  // placeholders
  document.querySelectorAll('[data-i18n-ph]').forEach(function(elx){ elx.placeholder=t(elx.getAttribute('data-i18n-ph')); });
  // grid toggle label depends on current on/off state
  var p=document.getElementById('paper');
  document.getElementById('gridToggle').querySelector('.lbl').textContent = p.classList.contains('grid-on')?t('tgGridHide'):t('tgGridShow');
  // language button shows the OTHER language
  document.getElementById('langToggle').textContent=t('langBtn');
  // re-fill selects with translated names
  fillSelect('field',FIELDS); fillSelect('canvas',CANVASES);
  document.getElementById('field').value=state.field; document.getElementById('canvas').value=state.canvas;
  // archetype chips + skeleton names + hints
  buildArchChips(); buildSkels(); syncHints();
}
/* layout search box */
document.getElementById('layoutSearch').addEventListener('input', function(){
  _layoutFilter.q=this.value.trim(); buildLayoutList();
});
document.getElementById('langToggle').addEventListener('click', function(){
  var switchSample = sampleMatchesOther();   // only swap demo content if untouched
  state.lang = state.lang==='zh'?'en':'zh';
  if(switchSample) loadSample(state.lang);
  applyLang(); render();
});

/* init — ?layout=&field=&canvas=&bl=&gu=&im=&accent=&lang=&grid=1&decor=1&ghost=1 */
(function initQuery(){
  var q=new URLSearchParams(location.search);
  if(q.get('lang')==='en'||q.get('lang')==='zh') state.lang=q.get('lang');
  if(q.get('layout')!=null){ var lv=q.get('layout');
    if(/^\d+$/.test(lv)){ state.layout=((parseInt(lv,10)%256)+256)%256; }
    else if(LEGACY_LAYOUT[lv]!=null){ state.layout=LEGACY_LAYOUT[lv]; } }
  if(q.get('field')&&FIELDS[q.get('field')]) state.field=q.get('field');
  if(q.get('canvas')&&CANVASES[q.get('canvas')]) state.canvas=q.get('canvas');
  ['bl','gu','im'].forEach(function(k){ if(q.get(k)){ state[k]=parseInt(q.get(k),10); var s=document.getElementById(k); if(s){s.value=state[k]; var lbl=document.getElementById(k+'V'); if(lbl)lbl.textContent=state[k];} } });
  if(q.get('accent')){ var hx=q.get('accent'); if(hx[0]!=='#')hx='#'+hx; state.accent=hx; accent.value=hx; accentHex.value=hx; }
  document.getElementById('field').value=state.field;
  document.getElementById('canvas').value=state.canvas;
  var p=document.getElementById('paper');
  if(q.get('grid')==='0') p.classList.remove('grid-on');
  if(q.get('decor')==='0') p.classList.remove('deco-on');
  if(q.get('ghost')==='0') p.classList.remove('ghost-on');
  // sync toggle button labels/states to current classes
  document.getElementById('gridToggle').classList.toggle('on',p.classList.contains('grid-on'));
  document.getElementById('gridToggle').querySelector('.lbl').textContent=p.classList.contains('grid-on')?'Hide grid':'Show grid';
  document.getElementById('decoToggle').classList.toggle('on',p.classList.contains('deco-on'));
  document.getElementById('ghostToggle').classList.toggle('on',p.classList.contains('ghost-on'));
})();
// if starting in English, swap the (Chinese) default sample content to English
if(state.lang==='en') loadSample('en');
applyLang(); render();
// reveal the active layout card in the left list
(function(){ var sel=document.querySelector('#skels .skel.sel'); if(sel)sel.scrollIntoView({block:'nearest'}); })();
</script>
